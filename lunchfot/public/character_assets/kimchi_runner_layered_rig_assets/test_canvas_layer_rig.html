<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<title>Kimchi Runner Layer Rig Test</title>
<style>
body { margin:0; background:#202020; color:white; font-family:sans-serif; }
.wrap { padding:20px; }
canvas { background:#f5f2e9; border-radius:16px; max-width:100%; }
code { background:#333; padding:2px 6px; border-radius:4px; }
</style>
</head>
<body>
<div class="wrap">
<h2>Kimchi Runner Layer Rig Test</h2>
<p>분리 레이어를 불러와서 Canvas에서 합성하는 테스트입니다. 이 파일은 리깅 구조 확인용입니다.</p>
<canvas id="game" width="900" height="620"></canvas>
</div>
<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const files = [
  "shadow",
  "dust_trail",
  "thigh_screen_right", "shin_screen_right", "foot_screen_right",
  "torso",
  "thigh_screen_left", "shin_screen_left", "foot_screen_left",
  "arm_screen_right", "arm_screen_left_with_spoon_bowl",
  "head_pot", "face_panel", "steam_top"
];

const imgs = {};
let loaded = 0;
for (const name of files) {
  const img = new Image();
  img.src = `./layers_full_canvas/${name}.png`;
  img.onload = () => { loaded++; if (loaded === files.length) requestAnimationFrame(loop); };
  imgs[name] = img;
}

let t0 = 0;
let x = 700;

function drawLayer(name, x, y, scale=0.55, angle=0, pivotX=512, pivotY=512) {
  const img = imgs[name];
  ctx.save();
  ctx.translate(x + pivotX*scale, y + pivotY*scale);
  ctx.rotate(angle);
  ctx.translate(-pivotX*scale, -pivotY*scale);
  ctx.drawImage(img, x, y, img.width*scale, img.height*scale);
  ctx.restore();
}

function loop(t) {
  const phase = t / 1000 * Math.PI * 2;
  if (!t0) t0 = t;
  x -= 2.4;
  if (x < 120) x = 700;

  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle = "#ded6bd";
  ctx.fillRect(0, 515, canvas.width, 14);

  const scale = 0.55;
  const y = -5 + Math.sin(phase*2) * 4;

  // 왼쪽으로 달리게 전체 컨테이너 반전
  ctx.save();
  ctx.translate(x + 512*scale, y + 512*scale);
  ctx.scale(-1, 1);
  ctx.translate(-(x + 512*scale), -(y + 512*scale));

  // 간단한 회전 테스트. 실제로는 Spine/Unity에서 각 본에 적용하는 것이 좋습니다.
  drawLayer("shadow", x, y, scale, 0, 430, 900);
  drawLayer("dust_trail", x + Math.sin(phase)*10, y, scale, 0, 780, 750);

  drawLayer("thigh_screen_right", x, y, scale, Math.sin(phase) * 0.18, 545, 570);
  drawLayer("shin_screen_right", x, y, scale, Math.sin(phase + Math.PI) * 0.28, 625, 660);
  drawLayer("foot_screen_right", x, y, scale, Math.sin(phase + Math.PI/2) * 0.18, 690, 740);

  drawLayer("torso", x, y + Math.sin(phase*2)*4, scale, Math.sin(phase)*0.02, 520, 610);

  drawLayer("thigh_screen_left", x, y, scale, Math.sin(phase + Math.PI) * 0.18, 405, 585);
  drawLayer("shin_screen_left", x, y, scale, Math.sin(phase) * 0.28, 385, 690);
  drawLayer("foot_screen_left", x, y, scale, Math.sin(phase - Math.PI/2) * 0.18, 365, 780);

  drawLayer("arm_screen_right", x, y, scale, Math.sin(phase + Math.PI) * 0.08, 690, 505);
  drawLayer("arm_screen_left_with_spoon_bowl", x, y, scale, Math.sin(phase) * 0.06, 315, 475);
  drawLayer("head_pot", x, y + Math.sin(phase*2)*2, scale, 0, 565, 360);
  drawLayer("face_panel", x, y + Math.sin(phase*2)*2, scale, 0, 555, 410);
  drawLayer("steam_top", x, y - Math.sin(phase)*3, scale, 0, 580, 120);

  ctx.restore();

  ctx.fillStyle = "#222";
  ctx.font = "18px sans-serif";
  ctx.fillText("Layer rig preview / left run", 24, 36);
  requestAnimationFrame(loop);
}
</script>
</body>
</html>
